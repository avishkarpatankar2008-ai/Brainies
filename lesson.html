<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Brainies — Lessons</title>
<!--
  PERF: font-display=swap prevents render-blocking while fonts load.
  Only load weights actually used (400,700) — dropped 500,600.
-->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&family=Sora:wght@700;800&display=swap" rel="stylesheet"/>
<!--
  PERF: OpenDyslexic loaded lazily via JS only when dyslexic mode active.
  Removed synchronous <link> here — saves ~150 KB on every page load.
-->
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0d0f;--bg2:#141618;--bg3:#1e2124;
  --border:#2c2f33;--border2:#3d4247;
  --text:#f0f2f4;--text2:#8b949e;
  --green:#3ddc84;--green-dim:rgba(61,220,132,.12);
  --red:#f87171;--radius:12px;
}
body.light{
  --bg:#f4f6f8;--bg2:#ffffff;--bg3:#edf0f3;
  --border:#dde1e7;--border2:#bcc3cc;
  --text:#1a1d21;--text2:#596475;
  --green:#1a9e56;--green-dim:rgba(26,158,86,.10);
}

/* ── ACCESSIBILITY MODES ── */
body.mode-dyslexic{--bg:#fefce8;--bg2:#fef9c3;--bg3:#fef08a;--border:#c8b400;--border2:#b8a400;--text:#111;--text2:#444;font-size:19px;line-height:2}
body.mode-dyslexic,body.mode-dyslexic *{font-family:'OpenDyslexic','Courier New',monospace!important;letter-spacing:.06em!important;word-spacing:.15em!important}
/* BUG8 FIX: dyslexic quiz feedback uses icons+border not just color */
body.mode-dyslexic .qopt.correct{background:#0a3d0a!important;border-color:#166534!important;color:#fff!important}
body.mode-dyslexic .qopt.wrong{background:#3d0a0a!important;border-color:#991b1b!important;color:#fff!important}
body.mode-dyslexic .quiz-fb.ok::before{content:'✅ ';}
body.mode-dyslexic .quiz-fb.err::before{content:'❌ ';}

body.mode-adhd{--bg:#f8f9fa;--bg2:#fff;--bg3:#f1f3f5;--border:#dee2e6;--border2:#ced4da;--text:#111;--text2:#555}
body.mode-adhd *{animation:none!important;transition:none!important}
body.mode-adhd .lesson-sidebar{display:none!important}
/* BUG9 FIX: when sidebar hidden, main content takes full width */
body.mode-adhd .layout{grid-template-columns:1fr!important}

body.mode-blind{--bg:#000;--bg2:#111;--bg3:#1a1a1a;--border:#555;--border2:#777;--text:#fff;--text2:#ccc;font-size:20px}
body.mode-blind button,body.mode-blind a{outline:3px solid #fff!important;outline-offset:3px}

/* BUG13+15 FIX: caption truncates to one readable line, clears via JS onend */
body.mode-deaf .caption-bar{display:flex!important}
.caption-bar.deaf-on{display:flex!important}
.caption-bar span{max-width:80vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* BUG16 FIX: motor mode targets sidebar items (divs with onclick) too */
body.mode-motor button,body.mode-motor a,body.mode-motor .sb-item{min-height:56px!important;font-size:18px!important;padding:.75rem 1.25rem!important}
body.mode-motor .sb-item{display:flex;align-items:center}

/* PERF: will-change only on elements that actually animate */
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);
     transition:background .2s,color .2s;font-size:16px;line-height:1.6}

.caption-bar{display:none;align-items:center;gap:.6rem;background:#0f172a;padding:.5rem 1.75rem;font-size:.82rem;color:#7dd3fc;border-bottom:1px solid #1e3a5f}
.cap-dot{width:7px;height:7px;border-radius:50%;background:#60a5fa;animation:bl 1.2s infinite;flex-shrink:0}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.2}}

.offline-bar{display:none;background:rgba(251,191,36,.1);border-bottom:1px solid rgba(251,191,36,.2);padding:.45rem 1.75rem;font-size:.8rem;color:#fbbf24;text-align:center}
.offline-bar.show{display:block}

.toast-wrap{position:fixed;bottom:5rem;left:50%;transform:translateX(-50%);z-index:9000;display:flex;flex-direction:column;gap:.4rem;align-items:center;pointer-events:none}
.toast{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:.5rem 1rem;font-size:.82rem;color:var(--text);white-space:nowrap;animation:tIn .15s ease}
.toast.ok{background:var(--green-dim);border-color:var(--green);color:var(--green)}
.toast.err{background:rgba(248,113,113,.08);border-color:var(--red);color:var(--red)}
@keyframes tIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

nav{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;padding:.75rem 1.5rem;
    background:var(--bg2);border-bottom:1px solid var(--border);
    position:sticky;top:0;z-index:50;
    /* PERF: promote nav to its own layer — prevents repaint on scroll */
    will-change:transform;transform:translateZ(0)}
.nav-logo{color:var(--green);font-size:1.05rem;font-weight:700;text-decoration:none;font-family:'Sora',sans-serif}
.nav-right{margin-left:auto;display:flex;gap:.35rem;flex-wrap:wrap;align-items:center}
/* PERF: transition only color/border, not "all" — avoids triggering layout */
nav a,nav button,nav select{
  padding:.35rem .7rem;border-radius:6px;border:1px solid var(--border2);
  background:var(--bg3);color:var(--text2);font-size:.78rem;cursor:pointer;
  text-decoration:none;font-family:'DM Sans',sans-serif;
  transition:color .15s,border-color .15s}
nav a:hover,nav button:hover{border-color:var(--green);color:var(--green)}

.layout{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 52px)}
@media(max-width:680px){.layout{grid-template-columns:1fr}.lesson-sidebar{display:none!important}}

.lesson-sidebar{
  background:var(--bg2);border-right:1px solid var(--border);
  padding:1.1rem .7rem;position:sticky;top:52px;
  height:calc(100vh - 52px);overflow-y:auto;
  /* PERF: contain layout/paint to sidebar box */
  contain:layout paint}
.sb-hd{font-size:.68rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text2);margin-bottom:.4rem;padding:0 .35rem}
.sb-prog{height:3px;background:var(--border2);border-radius:50px;margin:.4rem .35rem .8rem}
.sb-prog-fill{height:3px;border-radius:50px;background:var(--green);transition:width .3s}
.sb-item{
  display:flex;align-items:center;gap:.5rem;padding:.5rem .55rem;
  border-radius:7px;cursor:pointer;font-size:.8rem;margin-bottom:.15rem;
  border:1px solid transparent;color:var(--text2);
  transition:color .12s,border-color .12s,background .12s}
.sb-item:hover{background:var(--bg3)}
.sb-item.active{background:var(--bg3);border-color:var(--green);color:var(--green)}
.sb-num{width:20px;height:20px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:700;flex-shrink:0;border:1px solid var(--border2)}
.sb-item.done .sb-num{background:var(--green);color:#000;border-color:var(--green)}

.lesson-main{padding:1.75rem 2.25rem 4rem;max-width:720px}
@media(max-width:900px){.lesson-main{padding:1.25rem .9rem}}

.lesson-tag{font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:var(--green);margin-bottom:.3rem}
.lesson-title{font-family:'Sora',sans-serif;font-size:1.8rem;font-weight:700;margin-bottom:.35rem;line-height:1.2}
.lesson-meta{font-size:.76rem;color:var(--text2);margin-bottom:1.5rem;display:flex;align-items:center;gap:.45rem;flex-wrap:wrap}
.meta-tag{padding:.15rem .5rem;border-radius:20px;background:var(--green-dim);border:1px solid rgba(61,220,132,.2);color:var(--green);font-size:.7rem}
.content p{margin-bottom:1rem;font-size:.93rem;line-height:1.75}
.content h3{font-size:1rem;font-weight:700;margin:1.4rem 0 .5rem;font-family:'Sora',sans-serif}
.callout{border-left:3px solid var(--green);padding:.8rem 1rem;background:var(--bg2);border-radius:0 7px 7px 0;margin:1rem 0;font-size:.86rem;color:var(--text2);line-height:1.6}
.callout strong{color:var(--green);display:block;margin-bottom:.25rem}

.quiz-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:1.35rem;margin-top:1.75rem}
.quiz-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.3rem;flex-wrap:wrap;gap:.4rem}
.quiz-title{font-size:.95rem;font-weight:700;font-family:'Sora',sans-serif}
.quiz-score-badge{font-size:.73rem;padding:.18rem .55rem;border-radius:20px;background:var(--green-dim);border:1px solid rgba(61,220,132,.2);color:var(--green);font-weight:600}
.quiz-q{font-size:.9rem;margin-bottom:.9rem;color:var(--text2);line-height:1.5}
.quiz-opts{display:flex;flex-direction:column;gap:.45rem}
.qopt{
  padding:.72rem .95rem;border-radius:8px;border:1px solid var(--border2);
  background:var(--bg3);cursor:pointer;font-size:.86rem;
  text-align:left;color:var(--text);font-family:'DM Sans',sans-serif;
  /* PERF: only transition color + border, not all */
  transition:color .12s,border-color .12s,background .12s}
.qopt:hover:not(:disabled){border-color:var(--green);background:var(--green-dim)}
.qopt:disabled{cursor:not-allowed;opacity:.8}
.qopt.correct{border-color:#22c55e!important;background:rgba(34,197,94,.15)!important;color:#22c55e!important;font-weight:600}
.qopt.wrong{border-color:#ef4444!important;background:rgba(239,68,68,.12)!important;color:#ef4444!important}
.quiz-fb{margin-top:.7rem;padding:.75rem .95rem;border-radius:8px;font-size:.84rem;display:none;line-height:1.5}
.quiz-fb.show{display:block}
.quiz-fb.ok{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.3);color:#22c55e}
.quiz-fb.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#ef4444}
.quiz-next{display:none;gap:.45rem;margin-top:.8rem;flex-wrap:wrap}
.quiz-next.show{display:flex}

.lesson-nav{display:flex;justify-content:space-between;margin-top:2.25rem;padding-top:1.25rem;border-top:1px solid var(--border);gap:.65rem;flex-wrap:wrap}
.navbtn{padding:.6rem 1.15rem;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);font-size:.86rem;cursor:pointer;font-family:'DM Sans',sans-serif;transition:color .12s,border-color .12s}
.navbtn:hover{border-color:var(--green);color:var(--green)}
.navbtn.primary{background:var(--green);color:#000;border-color:var(--green);font-weight:700}

#ocr-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:500;align-items:center;justify-content:center}
#ocr-modal.show{display:flex}
.ocr-box{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);padding:1.65rem;width:min(460px,95vw);position:relative}
.ocr-box h3{font-size:.95rem;margin-bottom:.7rem;font-family:'Sora',sans-serif}
.ocr-upload{border:2px dashed var(--border2);border-radius:7px;padding:1.75rem;text-align:center;cursor:pointer;color:var(--text2);font-size:.86rem;transition:border-color .15s,color .15s}
.ocr-upload:hover{border-color:var(--green);color:var(--green)}
.ocr-result{margin-top:.7rem;padding:.7rem;background:var(--bg3);border-radius:6px;font-size:.83rem;color:var(--text2);max-height:200px;overflow-y:auto;display:none}
.ocr-actions{display:none;gap:.45rem;margin-top:.45rem;flex-wrap:wrap}
.modal-close{position:absolute;top:.7rem;right:.7rem;background:var(--bg3);border:1px solid var(--border2);border-radius:5px;padding:.28rem .65rem;cursor:pointer;color:var(--text2);font-size:.78rem;font-family:'DM Sans',sans-serif}

/* PERF: vfab uses transform for animation — GPU composited, zero layout cost */
#vfab{
  position:fixed;bottom:1.2rem;right:1.2rem;width:48px;height:48px;
  border-radius:50%;background:var(--green);color:#000;border:none;
  font-size:1.15rem;cursor:pointer;z-index:99;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 10px rgba(61,220,132,.28);
  transition:background .15s,transform .1s;
  will-change:transform}
#vfab:hover{transform:scale(1.07)}
#vfab.on{background:#f97316;box-shadow:0 2px 10px rgba(249,115,22,.28)}
/* PERF: pulse via transform+opacity only — no box-shadow animation (expensive) */
#vfab.on::after{
  content:'';position:absolute;inset:-4px;border-radius:50%;
  border:2px solid #f97316;
  animation:fabPulse .9s ease infinite;pointer-events:none}
@keyframes fabPulse{0%{opacity:.6;transform:scale(1)}100%{opacity:0;transform:scale(1.55)}}

/* ── VOICE STATUS PILL ── */
#voice-pill{
  position:fixed;top:.6rem;right:4.5rem;
  background:rgba(10,26,10,.92);border:1px solid var(--green);
  border-radius:20px;padding:.28rem .75rem;
  font-size:.72rem;color:var(--green);
  display:none;align-items:center;gap:.45rem;
  z-index:98;backdrop-filter:blur(4px);pointer-events:none}
#voice-pill.show{display:flex}
.vp-dot{width:6px;height:6px;border-radius:50%;background:var(--green);
  animation:vpPulse 1.2s ease infinite;flex-shrink:0}
@keyframes vpPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}
#voice-pill-text{max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
</style>

<!--
  PERF: Tesseract loaded on-demand only when OCR modal is opened,
  not on page load. Saves ~3 MB of JS parsing on every visit.
-->
<script>
/* ═══════════════════════════════════════════════════════════
   PERF NOTES — what was slow and what was fixed:
   1. SpeechRecognition: continuous=true caused browser to hold
      an open audio stream and process audio in real-time even
      when the user wasn't speaking → high CPU. Fixed: use
      continuous=false with instant auto-restart instead.
   2. interimResults=true fired onresult on every syllable,
      triggering DOM updates 10-20x per second → jank.
      Fixed: interimResults=false, only act on final results.
   3. maxAlternatives=3 forces the speech engine to compute
      3 transcriptions instead of 1 → 3× CPU per utterance.
      Fixed: maxAlternatives=1.
   4. speechSynthesis.cancel() before every speak() call caused
      the TTS engine to restart mid-sentence, creating a stutter
      and adding ~200ms latency. Fixed: only cancel if actually
      speaking, use a lightweight queue.
   5. renderSidebar() called innerHTML='' + 9× DOM appends on
      every lesson load AND after every quiz answer → forced
      layout recalc. Fixed: only re-render changed items, use
      DocumentFragment for batch DOM writes.
   6. translate / simplify called APIs serially in a for-loop
      (await in loop). Fixed: Promise.all for parallel calls.
   7. OpenDyslexic font link was render-blocking on every page
      load regardless of profile. Fixed: inject lazily.
   8. transition:all on nav/buttons triggers layout+paint on
      hover. Fixed: only transition color/border-color.
   9. OCR (Tesseract, ~3 MB) was loaded eagerly in a <script>
      tag. Fixed: dynamic import on first OCR click.
  10. Voice restart delay was 250 ms between sessions, adding
      dead time where no speech was being recognised. Fixed: 80ms.
═══════════════════════════════════════════════════════════ */

const API = '';
let cur = 0, originalContent = {}, ocrExtracted = '';
let tesseractReady = false;

/* ── QUIZ ANSWERS ── */
const QA = {
  0:{c:1,e:'Plants use photosynthesis — not respiration — to make food from sunlight.'},
  1:{c:2,e:'The nucleus controls all cell activities and contains DNA.'},
  2:{c:0,e:'The water cycle: evaporation → clouds → rain (precipitation).'},
  3:{c:1,e:'Plants absorb carbon dioxide (CO₂) from the air through stomata.'},
  4:{c:3,e:'Isaac Newton described the law of universal gravitation after observing a falling apple.'},
  5:{c:1,e:'DNA stands for Deoxyribonucleic Acid.'},
  6:{c:0,e:'Friction is the force that opposes motion between two surfaces.'},
  7:{c:1,e:'Earth takes 365.25 days to orbit the Sun — the 0.25 gives us a leap year.'},
  8:{c:0,e:'Only plants, algae, and some bacteria can photosynthesise.'},
};

const LESSONS=[
  {chapter:'Lesson 1',title:'Introduction to Plants',dur:'5 min',
   content:`<p>Plants are living organisms found almost everywhere on Earth — in forests, deserts, oceans, and frozen tundra. Unlike animals, plants make their own food using sunlight through a process called photosynthesis.</p>
   <h3>Why plants matter</h3>
   <p>Plants produce the oxygen we breathe and form the base of all food chains. Without plants, life on Earth would be impossible. There are over 390,000 known plant species, from tiny mosses to giant sequoias that live thousands of years.</p>
   <div class="callout"><strong>💡 Key fact</strong>Every breath we take depends on plants. They release oxygen as a byproduct of making food from sunlight.</div>`,
   q:'Which process do plants use to make their own food?',opts:['Respiration','Photosynthesis','Digestion','Fermentation']},

  {chapter:'Lesson 2',title:'Parts of a Plant',dur:'6 min',
   content:`<p>Every plant has parts that do specific jobs. The main parts are roots, stem, leaves, flowers, and fruit. Each part is essential for the plant to survive and reproduce.</p>
   <h3>Roots and stem</h3>
   <p>Roots anchor the plant in the soil and absorb water and minerals. The stem supports the plant and acts as a pipeline, moving water up to the leaves and sugars down to the roots.</p>
   <h3>Leaves</h3>
   <p>Leaves are the main site of photosynthesis. Their broad flat shape captures maximum sunlight. Tiny pores called stomata on the underside allow carbon dioxide in and oxygen out.</p>
   <div class="callout"><strong>⚠ Remember</strong>The nucleus controls all cell activities and contains DNA — this applies to plant cells too, not just animals.</div>`,
   q:'Which part of a plant cell controls all cell activities?',opts:['Cell wall','Chloroplast','Nucleus','Vacuole']},

  {chapter:'Lesson 3',title:'How Plants Grow',dur:'7 min',
   content:`<p>Plants grow from seeds through germination. When conditions are right — warmth, moisture, and light — a seed absorbs water and its embryo starts growing. A shoot pushes upward and roots push downward.</p>
   <h3>The water cycle and plants</h3>
   <p>Plants depend on the water cycle. Water evaporates from soil and plant leaves, rises as water vapour, condenses into clouds, and falls as rain. This keeps water moving through the environment continuously.</p>
   <div class="callout"><strong>💡 Key fact</strong>A large tree can release hundreds of litres of water into the atmosphere every single day through transpiration — water evaporating from its leaves.</div>`,
   q:'What does the water cycle describe?',opts:['Water evaporating, forming clouds, and falling as rain','How plants absorb sunlight','How animals drink water','How rivers reach the sea']},

  {chapter:'Lesson 4',title:'Photosynthesis',dur:'8 min',
   content:`<p>Photosynthesis is how plants make their own food. Using sunlight, water, and carbon dioxide, plants produce glucose (sugar) and release oxygen. It happens in the green parts of the plant, especially leaves.</p>
   <h3>The equation</h3>
   <div class="callout"><strong>💡 Key formula</strong>Carbon dioxide + Water + Sunlight → Glucose + Oxygen<br/>6CO₂ + 6H₂O + light → C₆H₁₂O₆ + 6O₂</div>
   <p>Photosynthesis happens inside chloroplasts — tiny green structures in plant cells. The green pigment chlorophyll captures sunlight energy. Only the green parts of a plant can photosynthesise.</p>`,
   q:'What do plants absorb from the air for photosynthesis?',opts:['Oxygen','Carbon dioxide','Nitrogen','Glucose']},

  {chapter:'Lesson 5',title:'Plant Reproduction',dur:'7 min',
   content:`<p>Plants reproduce in two main ways: sexually using seeds from flowers, and asexually using existing plant parts. Both methods have advantages in different environments.</p>
   <h3>Pollination</h3>
   <p>Sexual reproduction needs pollination — pollen transfers from the stamen (male) to the pistil (female). Wind, insects, birds, and bats help pollinate. After fertilisation, seeds develop inside fruit.</p>
   <div class="callout"><strong>💡 Did you know?</strong>Bees pollinate about one-third of all the food we eat. Without bees, most fruits and vegetables would fail to grow.</div>

/* ─────────────────────────────────────────────────────────
   TOAST — lightweight, no heavy class manipulation
───────────────────────────────────────────────────────── */
function toast(msg,type){
  const w=document.getElementById('toast-wrap');
  const t=document.createElement('div');
  t.className='toast'+(type?' '+type:'');
  t.textContent=msg;
  w.appendChild(t);
  setTimeout(()=>{
    t.style.cssText='opacity:0;transition:opacity .2s';
    setTimeout(()=>t.remove(),220);
  },2200);
}

/* ─────────────────────────────────────────────────────────
   TTS — fixed stutter: only cancel if already speaking,
         no rapid cancel+speak cycles
───────────────────────────────────────────────────────── */
let _ttsQueue=[], _ttsBusy=false;
function speak(txt){
  if(!('speechSynthesis' in window))return;
  _ttsQueue=[txt];
  if(!_ttsBusy)_ttsFlush();
}
function _ttsFlush(){
  if(!_ttsQueue.length){_ttsBusy=false;return;}
  _ttsBusy=true;
  const txt=_ttsQueue.shift();
  if(window.speechSynthesis.speaking||window.speechSynthesis.pending)
    window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(txt);
  u.lang='en-IN';u.rate=1.0;u.pitch=1;
  // Stop mic while app is speaking — mic would pick up TTS and break recognition
  u.onstart=()=>{
    if(vOn&&vRecog){try{vRecog.stop();}catch{}}
    clearTimeout(vRestartTimer);
    // BUG13+15 FIX: show short caption (first 80 chars) for deaf users
    const c=document.getElementById('cap-txt');
    if(c)c.textContent=txt.substring(0,80)+(txt.length>80?'…':'');
  };
  // Resume mic only after speech fully ends
  u.onend=()=>{
    _ttsBusy=false;
    _ttsFlush();
    if(!vPaused&&!_ttsBusy) scheduleVRestart(150);
    // BUG13 FIX: clear caption after speech ends so stale text doesn't linger
    if(!_ttsBusy){const c=document.getElementById('cap-txt');if(c)c.textContent='';}
  };
  u.onerror=()=>{
    _ttsBusy=false;
    _ttsFlush();
    if(!vPaused&&!_ttsBusy) scheduleVRestart(150);
    if(!_ttsBusy){const c=document.getElementById('cap-txt');if(c)c.textContent='';}
  };
  window.speechSynthesis.speak(u);
}
function stopTTS(){
  _ttsQueue=[];_ttsBusy=false;
  window.speechSynthesis.cancel();
  if(!vPaused) scheduleVRestart(150); // resume mic when speech force-stopped
}

───────────────────────────────────────────────────────── */
function checkAns(btn,li,j){
  if(btn.disabled)return;
  const ans=QA[li];
  document.querySelectorAll('.qopt').forEach(b=>b.disabled=true);
  const correct=j===ans.c;
  const alreadyAnswered=getQuizScores().hasOwnProperty(li);
  saveQuizScore(li,correct);
  const fb=document.getElementById('qfb');
  if(correct){
    btn.classList.add('correct');
    fb.className='quiz-fb show ok';
    fb.textContent='✅ Correct! '+ans.e;
    speak('Correct! '+ans.e);
    toast('✅ Correct! +50 points','ok');
    // Only award points the first time this quiz is answered
    if(!alreadyAnswered){
      localStorage.setItem('brainies_points',
        (parseInt(localStorage.getItem('brainies_points')||'0')+50).toString());
    }
  }else{
    btn.classList.add('wrong');
    const opts=document.querySelectorAll('.qopt');
    if(opts[ans.c])opts[ans.c].classList.add('correct');
    fb.className='quiz-fb show err';
    fb.textContent='❌ Not quite. '+ans.e;
    const correctText=opts[ans.c]?opts[ans.c].textContent.trim():'';
    speak('Wrong. The correct answer was: '+correctText+'. '+ans.e);
    toast('❌ Wrong answer','err');
  }
  document.getElementById('qnext').className='quiz-next show';
  const badge=document.querySelector('.quiz-score-badge');
  if(badge)badge.textContent=correct?'✅ Correct':'❌ Missed';
}

/* ─────────────────────────────────────────────────────────
   SIMPLIFY — PERF: parallel fetch instead of serial await-in-loop
───────────────────────────────────────────────────────── */
const _simplifyFallback=text=>{
  const rep={'photosynthesis':'how plants make food','chlorophyll':'green pigment in plants','mitochondria':'energy-making part of a cell','approximately':'about','subsequently':'then','furthermore':'also','nevertheless':'but','consequently':'so','demonstrates':'shows','utilizes':'uses','significant':'important','fundamental':'basic','organisms':'living things','evaporation':'water turning into vapour','transpiration':'water loss from plant leaves'};
  let r=text;
  for(const[h,e]of Object.entries(rep))
    r=r.replace(new RegExp(h,'gi'),m=>m[0]===m[0].toUpperCase()?e[0].toUpperCase()+e.slice(1):e);
  return r;
};

async function simplifyLesson(){
  const btn=document.getElementById('simp-btn');
  if(btn.disabled)return; // prevent double-call
  btn.disabled=true;
  btn.textContent='✨ Simplifying…';
  const paras=[...document.querySelectorAll('#lesson-content p')];
  paras.forEach((p,i)=>{if(!originalContent[i])originalContent[i]=p.textContent;});
  paras.forEach(p=>p.textContent='Simplifying…');

  const results=await Promise.all(paras.map(async(p,i)=>{
    try{
      const r=await fetch(API+'/simplify',{method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({text:originalContent[i]}),
        signal:AbortSignal.timeout(8000)});
      const d=await r.json();
      return d.result||originalContent[i];
    }catch{return _simplifyFallback(originalContent[i]);}
  }));

  paras.forEach((p,i)=>p.textContent=results[i]);
  btn.disabled=false;
  btn.textContent='✨ Simplify';
  document.getElementById('simp-btn').style.display='none';
  document.getElementById('restore-btn').style.display='';
  toast('✅ Text simplified!','ok');
  speak('Text simplified.');
}

/* ─────────────────────────────────────────────────────────
   TRANSLATE — PERF: parallel fetch for all paragraphs
───────────────────────────────────────────────────────── */
async function translateLesson(lang){
  if(!lang)return;
  const paras=[...document.querySelectorAll('#lesson-content p')];
  const origTexts=paras.map(p=>p.textContent);
  paras.forEach(p=>p.textContent='Translating…');

  const results=await Promise.all(origTexts.map(async orig=>{
    try{
      try{
        const r=await fetch(API+'/translate',{method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({text:orig.substring(0,500),lang}),
          signal:AbortSignal.timeout(8000)});
        const d=await r.json();
        if(d.error)throw new Error(d.error);
        return d.result;
      }catch{
        const r=await fetch('https://api.mymemory.translated.net/get?q='+
          encodeURIComponent(orig.substring(0,500))+'&langpair=en|'+lang);
        const d=await r.json();
        return d.responseData.translatedText;
      }
    }catch{return orig;}
  }));

  paras.forEach((p,i)=>p.textContent=results[i]);
  toast('✅ Translated!','ok');
}

function openOCR(){

    document.head.appendChild(s);
  }
}
function closeOCR(){document.getElementById('ocr-modal').className='';document.getElementById('ocr-file').value='';}

async function runOCR(input){
  const file=input.files[0];if(!file)return;
  const out=document.getElementById('ocr-result');
  out.style.display='block';out.textContent='Loading OCR engine…';
  // Wait for Tesseract to be ready
  let waited=0;
  while(!window.Tesseract&&waited<8000){await new Promise(r=>setTimeout(r,100));waited+=100;}
  if(!window.Tesseract){out.textContent='OCR engine failed to load. Check your internet.';return;}
  out.textContent='Scanning…';
  try{
    const{data:{text}}=await Tesseract.recognize(file,'eng',{
      logger:m=>{if(m.status==='recognizing text')out.textContent='Scanning '+Math.round(m.progress*100)+'%…';}
    });
    ocrExtracted=text.trim();
    out.textContent=ocrExtracted||'No text found. Try a clearer image.';
    if(ocrExtracted)document.getElementById('ocr-actions').style.display='flex';
  }catch{out.textContent='OCR failed. Try a clearer image.';}
  input.value='';
}
function sendOCRToSimplify(){if(!ocrExtracted)return;closeOCR();toast('OCR text loaded — tap Simplify');}
function speakOCR(){if(ocrExtracted)speak(ocrExtracted.substring(0,600));}

/* ═══════════════════════════════════════════════════════════
   ALWAYS-ON VOICE ENGINE
   Key perf fixes vs original:
   • continuous=false   → browser stops holding open mic stream
   • interimResults=false → zero partial-result DOM updates
   • maxAlternatives=1  → 3× faster transcription
   • restart gap: 80ms  → was 250ms, cuts dead listening time
   • No DOM update on every onstart/onend cycle
   • Voice pill instead of full bar (lighter DOM)
═══════════════════════════════════════════════════════════ */
let vRecog=null, vOn=false, vPaused=false, vRestartTimer=null;

function startVoice(){
  if(vPaused||vOn)return;
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return;

  vRecog=new SR();
  vRecog.lang='en-IN';
  vRecog.continuous=false;       // ← was true: caused open audio stream + high CPU
  vRecog.interimResults=false;   // ← was true: fired onresult on every syllable
  vRecog.maxAlternatives=1;      // ← was 3: 3× work for no user benefit

  vRecog.onstart=()=>{
    vOn=true;
    // PERF: update only a small pill, not a full bar
    document.getElementById('voice-pill').className='show';
    document.getElementById('vfab').className='on';
  };

  vRecog.onresult=(e)=>{
    // PERF: only final results, no interim processing
    let txt='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal)txt+=e.results[i][0].transcript;
    }
    txt=txt.toLowerCase().trim();
    if(txt){
      document.getElementById('voice-pill-text').textContent=txt;
      handleLessonVoice(txt);
    }
  };

  vRecog.onerror=(e)=>{
    vOn=false;
    if(e.error==='not-allowed'){
      vPaused=true;
      document.getElementById('vfab').className='';
      document.getElementById('voice-pill').className='';
      return;
    }
    // PERF: short delay on no-speech errors, longer only on real errors
    scheduleVRestart(e.error==='no-speech'?80:600);
  };

  vRecog.onend=()=>{
    vOn=false;
    document.getElementById('voice-pill').className='';
    // PERF: 80ms gap instead of 250ms — barely perceptible, faster pickup
    scheduleVRestart(80);
  };

  try{vRecog.start();}catch{scheduleVRestart(800);}
}

function scheduleVRestart(ms){
  clearTimeout(vRestartTimer);
  vRestartTimer=setTimeout(()=>{if(!vPaused)startVoice();},ms);
}

function toggleVoice(){
  if(vPaused){
    vPaused=false;
    document.getElementById('vfab').className='on';
    startVoice();
    speak('Voice on.');
  }else{
    vPaused=true;
    clearTimeout(vRestartTimer);
    if(vRecog){try{vRecog.stop();}catch{}}
    vOn=false;
    document.getElementById('vfab').className='';
    document.getElementById('voice-pill').className='';
    stopTTS();
  }
}

/* ─────────────────────────────────────────────────────────
   LESSON VOICE COMMANDS
───────────────────────────────────────────────────────── */
function handleLessonVoice(t){
  // Check longer stop phrases BEFORE bare "stop" to avoid collision
  if(/\b(stop reading|stop speaking)\b/.test(t)){stopTTS();return;}
  if(/\b(stop|quiet|silence)\b/.test(t)){stopTTS();return;}
  if(/\b(read lesson|read aloud|read content|repeat lesson)\b/.test(t)){readLesson();return;}
  if(/\b(read quiz|read options|read answers|what are the options|repeat quiz)\b/.test(t)){speakQuiz();return;}
  if(/\b(read)\b/.test(t)&&!t.includes('option')&&!t.includes('answer')){readLesson();return;}
  if(/\b(quiz|question)\b/.test(t)){speakQuiz();return;}

  // Option selection
  const optMap={'1':0,'one':0,'first':0,'a':0,'option one':0,'answer one':0,
                '2':1,'two':1,'second':1,'b':1,'option two':1,'answer two':1,
                '3':2,'three':2,'third':2,'c':2,'option three':2,'answer three':2,
                '4':3,'four':3,'fourth':3,'d':3,'option four':3,'answer four':3};
  for(const[phrase,idx]of Object.entries(optMap)){
    if(new RegExp('\\b'+phrase+'\\b').test(t)){
      const btns=document.querySelectorAll('.qopt');
      if(!btns.length){speak('No quiz visible. Scroll down.');return;}
      if(btns[idx]){
        if(btns[idx].disabled){speak('Already answered. Say next lesson.');return;}
        btns[idx].click();return;
      }
    }
  }

  if(/\b(next|next lesson|complete|finish|done)\b/.test(t)){completeLess(cur);return;}
  if(/\b(back|previous|go back)\b/.test(t)){loadLesson(Math.max(0,cur-1));return;}
  if(/\b(simplify|easy language)\b/.test(t)){simplifyLesson();return;}
  if(/\b(restore|original|undo)\b/.test(t)){restoreLesson();return;}
  if(t.includes('hindi')){translateLesson('hi');return;}
  if(t.includes('marathi')){translateLesson('mr');return;}
  if(t.includes('tamil')){translateLesson('ta');return;}
  if(t.includes('telugu')){translateLesson('te');return;}
  if(/\b(home|go home)\b/.test(t)){speak('Going home.');setTimeout(()=>window.location.href='index.html',800);return;}
  if(/\b(scan|ocr|camera)\b/.test(t)){openOCR();return;}
  if(/\b(help|commands)\b/.test(t)){
    speak('Commands: read lesson, read quiz, option 1 to 4, next, previous, simplify, translate Hindi, stop, home.');return;
  }
}

/* ─────────────────────────────────────────────────────────
   OFFLINE
───────────────────────────────────────────────────────── */
function checkOnline(){
  document.getElementById('offline-bar').className=
    navigator.onLine?'offline-bar':'offline-bar show';
}

/* ─────────────────────────────────────────────────────────
   INIT
───────────────────────────────────────────────────────── */
window.addEventListener('load',()=>{
  const p=localStorage.getItem('brainies_profile');
  if(!p){window.location.href='welcome.html';return;}

  ['blind','dyslexic','adhd','deaf','motor'].forEach(m=>document.body.classList.remove('mode-'+m));
  if(p!=='standard')document.body.classList.add('mode-'+p);
  if(p==='deaf')document.getElementById('caption-bar').classList.add('deaf-on');

  // PERF: load OpenDyslexic only once per session using a global flag
  // BUG-H FIX: index.html may have already loaded it — check before injecting again
  if(p==='dyslexic'&&!window.__odLoaded&&!document.querySelector('[data-od]')){
    window.__odLoaded=true;
    const lnk=document.createElement('link');
    lnk.rel='stylesheet';lnk.dataset.od='1';
    lnk.href='https://fonts.cdnfonts.com/css/opendyslexic';
    document.head.appendChild(lnk);
  }

  if(localStorage.getItem('brainies_theme')==='light'){
    document.body.classList.add('light');
    document.getElementById('theme-btn').textContent='☀️';
  }

  cur=parseInt(localStorage.getItem('brainies_curlss')||'0');
  if(cur<0||cur>=LESSONS.length)cur=0;

  loadLesson(cur);
  buildSidebar();
  checkOnline();
  window.addEventListener('online',checkOnline);
  window.addEventListener('offline',checkOnline);

  // BUG1 FIX: speak instructions first, THEN start voice (mic never open during TTS)
  setTimeout(()=>{
    if(p==='blind'){
      speak('Lesson loaded. '+LESSONS[cur].title+'. Say read lesson for content. Say read quiz for the question. Say help for commands.', startVoice);
    } else {
      startVoice();
    }
  },200);

  // Expose hooks
  window.nextLesson=()=>completeLess(cur);
  window.prevLesson=()=>loadLesson(Math.max(0,cur-1));
  window.simplifyLesson=simplifyLesson;
  window.translateLesson=translateLesson;
  window.speakQuiz=speakQuiz;
});

document.addEventListener('keydown',e=>{
  if(e.altKey&&e.key==='r'){e.preventDefault();readLesson();}
  if(e.altKey&&e.key==='q'){e.preventDefault();speakQuiz();}
  if(e.altKey&&e.key==='ArrowRight'){e.preventDefault();completeLess(cur);}
  if(e.altKey&&e.key==='ArrowLeft'){e.preventDefault();loadLesson(Math.max(0,cur-1));}
  if(e.key==='Escape')closeOCR();
});
</script>
